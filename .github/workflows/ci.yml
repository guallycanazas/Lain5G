name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  softwarex-check:
    name: Safe SoftwareX check
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        # actions/checkout stable tag v4, resolved with git ls-remote.
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python stable tag v5, resolved with git ls-remote.
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/constraints.txt
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Set up Node.js
        # actions/setup-node stable tag v4, resolved with git ls-remote.
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Confirm Docker Compose parser
        run: docker compose version

      # Installs from pinned inputs, runs backend coverage (including sandboxed
      # dry-run guards), frontend tests/typecheck/build, and all static checks.
      - name: Run unified safe check
        run: make softwarex-check
